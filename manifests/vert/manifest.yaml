apiVersion: v1
kind: Service
metadata:
  name: vert
  namespace: vert
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: web
    name: web
  selector:
    app: vert
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vert
  namespace: vert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vert
  template:
    metadata:
      labels:
        app: vert
    spec:
      containers:
      - name: web
        image: ghcr.io/vert-sh/vert:sha-438f91a
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: web
        resources:
          limits:
            memory: 200Mi
          requests:
            memory: 200Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vert
  namespace: vert
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - image.cluster.fun
    secretName: vert-ingress
  rules:
  - host: image.cluster.fun
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: vert
            port:
              number: 80

